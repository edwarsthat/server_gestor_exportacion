<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Identificación</title>
    <style>
        /* 
        ========================================
        PERSONALIZACIÓN DE COLORES
        ========================================
        Para cambiar los colores de la tarjeta, modifica estos valores:
        
        --color-principal: Color naranja/amarillo (fondo superior y borde de foto)
        --color-secundario: Color de fondo diagonal (generalmente gris claro o blanco)
        
        Ejemplos de colores:
        - Naranja: #FFC107
        - Azul: #2196F3
        - Verde: #4CAF50
        - Rojo: #F44336
        ========================================
        */

        :root {

            /* COLORES PRINCIPALES - Cambia estos valores para personalizar */
            --color-principal: {{COLOR_PRINCIPAL}};
            --color-secundario: #F5F5F5;
        }

        @font-face {
            font-family: 'Montserrat';
            src: url('{{MONTSERRAT_FONT}}') format('truetype');
            font-weight: 100 900;
            font-style: normal;
        }

        @font-face {
            font-family: 'Montserrat';
            src: url('{{MONTSERRAT_FONT_ITALIC}}') format('truetype');
            font-weight: 100 900;
            font-style: italic;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent;
            display: block;
            width: 450px;
            height: 713px;
            font-family: 'Montserrat', sans-serif;
        }

        .card {
            width: 450px;
            height: 713px;
            background: white;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .header {
            background: var(--color-principal);
            height: 350px;
            text-align: center;
            position: relative;
            overflow: visible;
            padding-top: 40px;
            border: none;
            outline: none;
            clip-path: polygon(0 0, 100% 0, 100% 40%, 0 100%);
        }

        .company-logo {
            width: 250px;
            height: auto;
            position: relative;
            z-index: 10;
            margin: -5px auto 0;
        }

        .company-logo img {
            width: 100%;
            height: auto;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.1));
            /* mix-blend-mode: multiply; - comentado porque puede causar problemas con base64 en Puppeteer */
        }

        .logo-placeholder {
            width: 100%;
            padding: 20px;
            color: white;
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .photo-container {
            width: 250px;
            height: 250px;
            margin: -240px auto 30px;
            border-radius: 50%;
            border: 6px solid var(--color-principal);
            /* Quitamos overflow hidden para permitir que el ::before sobresalga */
            background: white;
            position: relative;
            z-index: 2;
            padding: 4px;
        }

        .photo-container::before {
            content: '';
            position: absolute;
            /* Estos valores negativos hacen que "sobresalga" */
            top: -12px;
            left: -12px;
            right: -12px;
            bottom: -12px;
            border: 6px solid white;
            border-radius: 50%;
            z-index: -1;
            /* Lo ponemos detrás del borde naranja */
            pointer-events: none;

        }

        .photo-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: #e0e0e0;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }

        .content {
            padding: 0 40px 40px;
            text-align: center;
        }

        .name {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .position {
            font-size: 15px;
            color: #666;
            margin-bottom: 10px;
        }

        .info {
            font-size: 13px;
            color: #333;
            margin-bottom: 20px;
        }

        .info-label {
            font-weight: bold;
        }

        .qr-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            border: none;
            border-radius: 10px;
            overflow: hidden;
            background: white;
        }

        .qr-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .qr-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 12px;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="header">
            <div class="company-logo">
                <img id="logoImg" src="{{LOGO_BASE64}}" alt="Logo">
            </div>
        </div>

        <div class="photo-container">
            <div class="photo-inner">
                <img id="photoImg" src="{{FOTO_BASE64}}" alt="Foto">
            </div>
        </div>

        <div class="content">
            <div class="name" id="employeeName">{{NOMBRE}}</div>
            <div class="position" id="employeePosition">{{CARGO}}</div>
            <div class="info">
                <span class="info-label">CC</span> <span id="employeeCC">{{CEDULA}}</span> -
                <span class="info-label">RH</span> <span id="employeeRH">{{RH}}</span>
            </div>

            <div class="qr-container">
                <img src="{{QR_URL}}" alt="QR Carnet">

            </div>
        </div>
    </div>


</body>

</html>
