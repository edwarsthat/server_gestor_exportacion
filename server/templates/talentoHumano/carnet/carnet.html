<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnetización - Celifrut</title>
    <style>
        :root {
            --card-width: 400px;
            /* Proporción aproximada basada en la imagen */
            --card-height: calc(var(--card-width) * 1.6);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .credential-container {
            width: var(--card-width);
            height: var(--card-height);
            position: relative;
            background-image: url('CREDENCIAL TEMPORAL.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        /* Contenedor del QR que reemplazará al original */
        #dynamic-qr {
            position: absolute;
            /* Estos valores son ajustables para que calcen exactamente sobre el QR de la imagen */
            top: 26.8%;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            /* Ajustar según tamaño del QR en la imagen */
            aspect-ratio: 1 / 1;
            background-color: white;
            /* Para tapar el QR de fondo */
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid white;
            /* Margen para asegurar que tape bien */
        }

        /* Estilo para el QR que se inserte (SVG o IMG) */
        #dynamic-qr img,
        #dynamic-qr svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Etiqueta de ayuda para desarrollo (puedes quitarla) */
        .qr-placeholder {
            color: #ccc;
            font-size: 12px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div class="credential-container">
        <!-- Contenedor del QR dinámico -->
        <div id="dynamic-qr">
            <!-- QR_INJECT_START -->
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data={{QR_URL}}" alt="QR Carnet">
            <!-- QR_INJECT_END -->
        </div>
    </div>

    <!-- 
        NOTA: Para cambiar el QR manualmente, reemplaza el contenido 
        entre QR_INJECT_START y QR_INJECT_END.
    -->
</body>

</html>
