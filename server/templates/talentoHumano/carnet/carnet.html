<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnetización - Celifrut</title>
    <style>
        @font-face {
            font-family: 'Montserrat';
            src: url('{{MONTSERRAT_FONT}}') format('truetype');
            font-weight: 100 900;
            font-style: normal;
        }

        @font-face {
            font-family: 'Montserrat';
            src: url('{{MONTSERRAT_FONT_ITALIC}}') format('truetype');
            font-weight: 100 900;
            font-style: italic;
        }

        :root {
            --card-width: 400px;
            --card-height: calc(var(--card-width) * 1.6);
            --color-principal: #1565C0;
        }

        * {
            font-family: 'Montserrat', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Montserrat', sans-serif;
        }

        .credential-container {
            width: var(--card-width);
            height: var(--card-height);
            position: relative;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(to right, #0A1560, #1565C0);
            height: 50%;
            position: relative;
            text-align: center;
            padding-top: 40px;
        }

        .company-logo {
            width: 250px;
            height: auto;
            position: relative;
            z-index: 10;
            margin: 0 auto;
        }

        .company-logo img {
            width: 100%;
            height: auto;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.1));
        }

        .header::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70%;
            background: white;
            clip-path: polygon(0 100%, 100% 15%, 100% 100%, 0 100%);
            z-index: 0;
        }

        /* Contenedor del QR que reemplazará al original */
        #dynamic-qr {
            position: absolute;
            top: 22%;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            aspect-ratio: 1 / 1;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 28px;
            border-radius: 12px;

            z-index: 2;
        }

        /* Estilo para el QR que se inserte (SVG o IMG) */
        #dynamic-qr img,
        #dynamic-qr svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .card-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            padding: 20px 30px 30px;
            box-sizing: border-box;
        }

        .card-footer .titulo {
            font-size: 30px;
            font-weight: 900;
            color: #111;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .card-footer .descripcion {
            font-size: 15px;
            color: #111;
            line-height: 1.6;
        }

        /* Etiqueta de ayuda para desarrollo (puedes quitarla) */
        .qr-placeholder {
            color: #ccc;
            font-size: 12px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div class="credential-container">
        <div class="header">
            <div class="company-logo">
                <img src="{{LOGO_BASE64}}" alt="Logo">
            </div>
        </div>
        <!-- Contenedor del QR dinámico -->
        <div id="dynamic-qr">
            <!-- QR_INJECT_START -->
            <img src="{{QR_URL}}" alt="QR Carnet">
            <!-- QR_INJECT_END -->
        </div>

        <div class="card-footer">
            <div class="titulo">Credencial Temporal</div>
            <div class="descripcion">Esta credencial es personal e intransferible. Debe portarse de forma visible en
                todo momento. En caso de pérdida, notifíquele de inmediato.</div>
        </div>
    </div>

    <!--
        NOTA: Para cambiar el QR manualmente, reemplaza el contenido
        entre QR_INJECT_START y QR_INJECT_END.
    -->
</body>

</html>
